@if (dialog(); as d) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div 
      class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs transition-opacity duration-300"
      (click)="onCancel()">
    </div>

    <!-- Modal Card -->
    <div 
      class="relative w-full max-w-md transform overflow-hidden rounded-2xl bg-white p-6 text-left align-middle shadow-2xl transition-all duration-300 border border-slate-100 dark:border-slate-800 dark:bg-slate-900 text-slate-800 dark:text-slate-100 animate-in fade-in zoom-in-95 duration-200">
      
      <div class="flex items-start gap-4">
        <!-- Icon Based on Type -->
        <div class="flex-shrink-0">
          @switch (d.type) {
            @case ('success') {
              <div class="flex h-12 w-12 items-center justify-center rounded-full bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
            }
            @case ('error') {
              <div class="flex h-12 w-12 items-center justify-center rounded-full bg-rose-50 dark:bg-rose-950/30 text-rose-600 dark:text-rose-400">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
              </div>
            }
            @case ('warning') {
              <div class="flex h-12 w-12 items-center justify-center rounded-full bg-amber-50 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
              </div>
            }
            @case ('confirm') {
              <div class="flex h-12 w-12 items-center justify-center rounded-full bg-indigo-50 dark:bg-indigo-950/30 text-indigo-600 dark:text-indigo-400">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
            }
          }
        </div>

        <!-- Content -->
        <div class="mt-1 flex-1">
          <h3 class="text-lg font-semibold leading-6 text-slate-900 dark:text-white">
            {{ d.title }}
          </h3>
          <div class="mt-2">
            <p class="text-sm text-slate-500 dark:text-slate-400 whitespace-pre-line leading-relaxed">
              {{ d.message }}
            </p>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="mt-6 flex justify-end gap-3">
        @if (d.cancelText) {
          <button 
            type="button" 
            class="px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 dark:text-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg transition-colors focus:outline-hidden focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 cursor-pointer"
            (click)="onCancel()">
            {{ d.cancelText }}
          </button>
        }
        
        <button 
          type="button"
          [class]="d.type === 'error' ? 'bg-rose-600 hover:bg-rose-700 focus:ring-rose-500' : 
                   d.type === 'warning' ? 'bg-amber-600 hover:bg-amber-700 focus:ring-amber-500' : 
                   d.type === 'success' ? 'bg-emerald-600 hover:bg-emerald-700 focus:ring-emerald-500' :
                   'bg-indigo-600 hover:bg-indigo-700 focus:ring-indigo-500'"
          class="px-4 py-2 text-sm font-medium text-white rounded-lg transition-colors focus:outline-hidden focus:ring-2 focus:ring-offset-2 cursor-pointer"
          (click)="onConfirm()">
          {{ d.confirmText || 'OK' }}
        </button>
      </div>

    </div>
  </div>
}
