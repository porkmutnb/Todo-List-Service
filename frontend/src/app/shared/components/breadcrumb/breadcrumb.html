<nav class="flex mb-6" aria-label="Breadcrumb">
  <ol class="inline-flex items-center flex-wrap gap-y-2 text-sm font-medium">
    <!-- Home base route first item -->
    <li class="inline-flex items-center">
      <a routerLink="/" class="inline-flex items-center text-slate-500 hover:text-indigo-650 dark:text-slate-400 dark:hover:text-indigo-400 transition-colors gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span>Home</span>
      </a>
      <svg class="w-4 h-4 text-slate-450 dark:text-slate-605 mx-2 shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
      </svg>
    </li>

    <!-- Items -->
    @for (item of items; track item.label; let last = $last) {
      <li class="inline-flex items-center">
        @if (!last && item.url) {
          <a [routerLink]="item.url" class="text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 transition-colors">
            {{ item.label }}
          </a>
          <svg class="w-4 h-4 text-slate-400 dark:text-slate-600 mx-2 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
          </svg>
        } @else {
          <span class="text-slate-800 dark:text-slate-200 font-semibold truncate">{{ item.label }}</span>
        }
      </li>
    }
  </ol>
</nav>
