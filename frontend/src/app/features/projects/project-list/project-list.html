<div class="space-y-6">
  <!-- Shared Breadcrumb Navigation -->
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <!-- Page Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">
        Projects List
      </h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
        Manage your workspaces, track tasks, and collaborate with team members.
      </p>
    </div>

    <!-- Create Project Trigger -->
    <a 
      routerLink="/projects/new" 
      class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-750 dark:bg-indigo-500 dark:hover:bg-indigo-600 rounded-xl shadow-xs transition-colors cursor-pointer">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      <span>Create Project</span>
    </a>
  </div>

  <!-- Main Table Container -->
  @if (isLoading() && projects().length === 0) {
    <div class="space-y-4 animate-pulse">
      <div class="h-10 bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
      <div class="h-44 bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
    </div>
  } @else {
    <app-data-table 
      [data]="projects()" 
      [columns]="columns" 
      [actionsTemplate]="rowActions">
    </app-data-table>
  }

  <!-- Template for Datatable Custom Row Actions -->
  <ng-template #rowActions let-row>
    <div class="flex items-center justify-end gap-1.5">
      <!-- View Button -->
      <a 
        [routerLink]="['/projects', row.id]" 
        class="inline-flex items-center justify-center p-1.5 rounded-lg text-slate-500 hover:text-indigo-650 hover:bg-slate-100 dark:hover:bg-slate-850 transition-colors"
        title="View Details">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </a>

      <!-- Edit Button (Optionally restricted to project Owners) -->
      <a 
        [routerLink]="['/projects', row.id, 'edit']" 
        class="inline-flex items-center justify-center p-1.5 rounded-lg text-slate-500 hover:text-amber-650 hover:bg-slate-100 dark:hover:bg-slate-850 transition-colors"
        title="Edit Project">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
      </a>

      <!-- Delete Button (Available for owners) -->
      @if (row.role === 'owner') {
        <button 
          (click)="deleteProject(row)"
          type="button" 
          class="inline-flex items-center justify-center p-1.5 rounded-lg text-slate-400 hover:text-rose-650 hover:bg-slate-100 dark:hover:bg-slate-850 transition-colors cursor-pointer"
          title="Delete Project">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      } @else {
        <!-- Disabled or empty slot for members -->
        <span class="w-7 h-7 inline-block"></span>
      }
    </div>
  </ng-template>

</div>
